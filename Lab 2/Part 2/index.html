    <title>Planet data table</title>
    <link href="./css/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Planet data table</h1>
	<table>
	<caption>Data about the planets of our solar system (Planetary facts taken from
	<a href="https://nssdc.gsfc.nasa.gov/planetary/factsheet/">
	Nasa's Planetary Fact Sheet - Metric</a></caption>
		<thead>
		<tr>
			<td colspan="2"></td>
			<th scope="col">Name</th>
			<th scope="col">Mass (10<sup>24</sup>kg)</th>
			<th scope="col">Diameter (km)</th></th>
			<th scope="col">Density (kg/m<sup>3</sup>)</th>
			<th scope="col">Gravity (m/s<sup>2</sup>)</th>
			<th scope="col">Length of day (hours)</th>
			<th scope="col">Distance from Sun (10<sup>6</sup>km)</th>
			<th scope="col">Mean temperature (°C)</th>
			<th scope="col">Number of moons</th>
			<th scope="col">Notes</th>
		</tr>
		</thead>
		<tbody></tbody>
	</table>
  </body>
</html>
